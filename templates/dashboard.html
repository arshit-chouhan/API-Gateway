
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>API Gateway Dashboard</h1>

<h2>Services</h2>
<ul>
{% for route,service in services.items() %}
<li>{{route}} → {{service}}</li>
{% endfor %}
</ul>

<h2>Logs</h2>
<table border="1">
<tr><th>Path</th><th>Status</th></tr>
{% for log in logs %}
<tr>
<td>{{log.path}}</td>
<td>{{log.status}}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
